<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Flap Tap</title>
  <meta name="theme-color" content="#2c80e2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Flap Tap">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="192x192" href="assets/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="assets/icon-512.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/icon-512.png">
  <style>
    :root {
      --glass: rgba(12, 20, 33, 0.38);
      --glass-strong: rgba(10, 16, 28, 0.62);
      --text: #ffffff;
      --muted: rgba(255,255,255,.85);
      --accent: #ffe48a;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-width: 100%;
      height: 100%;
      min-height: 100%;
      background: #87cfff;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-text-size-adjust: 100%;
    }

    body {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: var(--app-height, 100vh);
      min-height: var(--app-height, 100vh);
      background: #87cfff;
    }

    .app {
      position: fixed;
      left: 0;
      top: 0;
      width: 100vw;
      height: var(--app-height, 100vh);
      padding: 0;
      margin: 0;
      overflow: hidden;
      background: #87cfff;
    }

    .stage {
      position: fixed;
      left: 0;
      top: 0;
      width: 100vw;
      height: var(--app-height, 100vh);
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: none;
      --ui-scale: 1;
    }

    canvas {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate3d(-50%, -50%, 0);
      display: block;
      border-radius: 0;
      box-shadow: none;
      background: #87cfff;
      will-change: width, height;
    }

    .hud {
      position: absolute;
      left: var(--game-left, 0px);
      top: var(--game-top, 0px);
      width: var(--game-width, 100vw);
      height: var(--game-height, var(--app-height, 100vh));
      pointer-events: none;
      overflow: hidden;
    }

    .chips {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 10px * var(--ui-scale));
      left: calc(14px * var(--ui-scale));
      right: calc(14px * var(--ui-scale));
      display: flex;
      justify-content: space-between;
      gap: calc(10px * var(--ui-scale));
    }

    .chip {
      padding: calc(10px * var(--ui-scale)) calc(14px * var(--ui-scale));
      border-radius: calc(18px * var(--ui-scale));
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.18);
      min-width: calc(74px * var(--ui-scale));
      text-align: center;
    }

    .chip .label {
      display: block;
      width: 100%;
      text-align: center;
      font-size: calc(11px * var(--ui-scale));
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(255,255,255,.7);
      margin-bottom: calc(2px * var(--ui-scale));
    }

    .chip .value {
      display: block;
      width: 100%;
      text-align: center;
      font-size: calc(28px * var(--ui-scale));
      font-weight: 800;
      line-height: 1;
      color: #fff8d5;
      text-shadow: 0 2px 10px rgba(0,0,0,.18);
    }

    .panel {
      position: absolute;
      left: 50%;
      top: 52%;
      transform: translate(-50%, -50%);
      width: min(86%, calc(360px * var(--ui-scale)));
      padding: calc(20px * var(--ui-scale)) calc(18px * var(--ui-scale)) calc(18px * var(--ui-scale));
      border-radius: calc(24px * var(--ui-scale));
      background: rgba(10, 16, 28, 0.62);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 18px 46px rgba(0,0,0,.28), inset 0 0 0 1px rgba(255,255,255,.16);
      text-align: center;
    }

    .panel.hidden { display: none; }

    .panel h1 {
      margin: 0 0 calc(8px * var(--ui-scale));
      font-size: calc(38px * var(--ui-scale));
      line-height: 1;
    }

    .subtitle {
      margin: 0;
      font-size: calc(15px * var(--ui-scale));
      line-height: 1.45;
      color: var(--muted);
    }

    .action {
      margin: calc(14px * var(--ui-scale)) 0 calc(8px * var(--ui-scale));
      font-weight: 800;
      font-size: calc(15px * var(--ui-scale));
      color: var(--accent);
    }

    .small {
      margin: 0;
      font-size: calc(13px * var(--ui-scale));
      color: rgba(255,255,255,.74);
    }

    .tap-zone {
      position: absolute;
      left: var(--game-left, 0px);
      top: var(--game-top, 0px);
      width: var(--game-width, 100vw);
      height: var(--game-height, var(--app-height, 100vh));
      z-index: 4;
      background: transparent;
    }

    .footer-note {
      display: none;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="stage" id="stage">
      <canvas id="game" width="420" height="740" aria-label="Sky Hopper game"></canvas>

      <div class="hud">
        <div class="chips">
          <div class="chip">
            <span class="label">Score</span>
            <span class="value" id="score">0</span>
          </div>
          <div class="chip">
            <span class="label">Best</span>
            <span class="value" id="best">0</span>
          </div>
        </div>

        <div class="panel" id="panel">
          <h1 id="panelTitle">Sky Hopper</h1>
          <p class="subtitle" id="panelSubtitle">An original tap to fly arcade game</p>
          <p class="action" id="panelAction">Tap, click, or press Space to start</p>
          <p class="small" id="panelSmall">Pass through the ancient columns.</p>
        </div>
      </div>

      <div class="tap-zone" id="tapZone" aria-hidden="true"></div>
    </div>

    <div class="footer-note">Tap or press Space to flap</div>
  </div>

  <script>
    (() => {
      const ASSETS = {
        backgroundClouds: "assets/background_clouds.png",
        backgroundMountains: "assets/background_mountains.png",
        backgroundTrees: "assets/background_trees.png",
        backgroundPlants: "assets/background_plants.png",
        titleLogo: "assets/title.png",
        crashLogo: "assets/CRASH.png",
        feathers: "assets/feathers.png",
        bird: "assets/bird_sheet.png",
        ground: "assets/ground.png",
        pillarCap: "assets/pillar_cap.png",
        pillarBase: "assets/pillar_base.png",
        pillarColumn: "assets/pillar_column.png",
        music: "assets/audio/music.mp3",
        flapSound: "assets/audio/flap.mp3",
        crashSound: "assets/audio/Crash_main.mp3"
      };

      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";

      const stageEl = document.getElementById("stage");
      const tapZone = document.getElementById("tapZone");

      const ui = {
        score: document.getElementById("score"),
        best: document.getElementById("best"),
        panel: document.getElementById("panel"),
        title: document.getElementById("panelTitle"),
        subtitle: document.getElementById("panelSubtitle"),
        action: document.getElementById("panelAction"),
        small: document.getElementById("panelSmall")
      };

      const DPR = Math.min(window.devicePixelRatio || 1, 2);
      const BASE_WIDTH = 420;

      const img = {
        backgroundClouds: new Image(),
        backgroundMountains: new Image(),
        backgroundTrees: new Image(),
        backgroundPlants: new Image(),
        titleLogo: new Image(),
        crashLogo: new Image(),
        feathers: new Image(),
        bird: new Image(),
        ground: new Image(),
        pillarCap: new Image(),
        pillarBase: new Image(),
        pillarColumn: new Image()
      };

      img.backgroundClouds.src = ASSETS.backgroundClouds;
      img.backgroundMountains.src = ASSETS.backgroundMountains;
      img.backgroundTrees.src = ASSETS.backgroundTrees;
      img.backgroundPlants.src = ASSETS.backgroundPlants;
      img.titleLogo.src = ASSETS.titleLogo;
      img.crashLogo.src = ASSETS.crashLogo;
      img.feathers.src = ASSETS.feathers;
      img.bird.src = ASSETS.bird;
      img.ground.src = ASSETS.ground;
      img.pillarCap.src = ASSETS.pillarCap;
      img.pillarBase.src = ASSETS.pillarBase;
      img.pillarColumn.src = ASSETS.pillarColumn;

      const BOX = {
        birdSheet: { x: 64, y: 66, w: 2381, h: 459 },
        birdTrimX: 30,
        birdTrimY: 10,
        groundCrop: { x: 0, y: 218, w: 2508, h: 249 }
      };

      const PIPE_CONFIG = {
        baseShift: 25,
        bottomShift: 5,
        topOffset: -5,
        minShaftH: 45
      };

      const VISUAL_SCALE = {
        bird: 1.875,
        column: 1.5
      };

      const DIFFICULTY = {
        baseGapRatio: 0.235,
        maxGapPx: 205,
        minGapPx: 142,
        gapTightenPerPoint: 1.3,
        baseSpawnInterval: 1.45,
        minSpawnInterval: 0.88,
        spawnTightenPerPoint: 0.02,
        speedIncreasePerPoint: 0.022,
        maxSpeedBoost: 0.80
      };

      const state = {
        mode: "loading",
        t: 0,
        bgScroll: 0,
        groundScroll: 0,
        spawnTimer: 0,
        score: 0,
        best: Number(localStorage.getItem("sky_hopper_best") || 0),
        flash: 0,
        shake: 0,
        pipes: [],
        particles: [],
        worldSpeed: 238,
        titleIntro: 0,
        titleExit: 0,
        audioReady: false,
        titleBird: {
          x: -220,
          y: 0,
          vx: 230,
          direction: 1,
          pass: 0,
          targetY: 0
        },
        gameplayIntro: 0,
        gameplayIntroActive: false,
        crashAnim: 0,
        crashLock: 0,
        crashExit: 0,
        crashExiting: false,
        crashFeathers: [],
        hasStartedOnce: false,
        columnsBehindGround: false
      };

      let audioUnlocked = false;
      let musicWanted = false;
      let audioContext = null;

      const decodedSounds = {
        music: null,
        flap: null,
        crash: null
      };

      const pendingSoundLoads = {};
      const pendingSoundFiles = {};

      let musicSource = null;
      let musicGain = null;
      let musicStartedAt = 0;
      let musicOffset = 0;

      function getAudioContext() {
        if (!audioContext) {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (!AudioContextClass) return null;
          audioContext = new AudioContextClass();
        }

        return audioContext;
      }

      function preloadSoundFile(name, src) {
        if (pendingSoundFiles[name]) return pendingSoundFiles[name];

        pendingSoundFiles[name] = fetch(src)
          .then(response => {
            if (!response.ok) throw new Error("Audio fetch failed");
            return response.arrayBuffer();
          })
          .catch(() => null);

        return pendingSoundFiles[name];
      }

      // Start downloading audio with the normal asset load.
      // iOS still requires the first user gesture before playback, but this
      // lets the files be ready to decode as soon as the first tap happens.
      preloadSoundFile("music", ASSETS.music);
      preloadSoundFile("flap", ASSETS.flapSound);
      preloadSoundFile("crash", ASSETS.crashSound);

      async function loadSoundBuffer(name, src) {
        if (decodedSounds[name]) return decodedSounds[name];
        if (pendingSoundLoads[name]) return pendingSoundLoads[name];

        const ctxAudio = getAudioContext();
        if (!ctxAudio) return null;

        pendingSoundLoads[name] = preloadSoundFile(name, src)
          .then(arrayBuffer => {
            if (!arrayBuffer) throw new Error("No audio data");
            return ctxAudio.decodeAudioData(arrayBuffer.slice(0));
          })
          .then(buffer => {
            decodedSounds[name] = buffer;
            return buffer;
          })
          .catch(() => null);

        return pendingSoundLoads[name];
      }

      function playBuffer(name, volume = 1) {
        if (!audioUnlocked || document.hidden) return;

        const ctxAudio = getAudioContext();
        const buffer = decodedSounds[name];

        if (!ctxAudio || !buffer) return;

        try {
          const source = ctxAudio.createBufferSource();
          const gain = ctxAudio.createGain();

          source.buffer = buffer;
          gain.gain.value = volume;

          source.connect(gain);
          gain.connect(ctxAudio.destination);

          source.start(0);
        } catch (err) {
          // Ignore playback failures so the game never breaks.
        }
      }

      function canPlayMusicNow() {
        return audioUnlocked && musicWanted && !document.hidden;
      }

      function stopMusicBuffer(rememberPosition = true) {
        const ctxAudio = getAudioContext();

        if (musicSource) {
          if (rememberPosition && ctxAudio && decodedSounds.music) {
            musicOffset = (musicOffset + (ctxAudio.currentTime - musicStartedAt)) % decodedSounds.music.duration;
          }

          try {
            musicSource.stop(0);
          } catch (err) {
            // Ignore already-stopped source errors.
          }

          try {
            musicSource.disconnect();
          } catch (err) {
            // Ignore disconnect errors.
          }

          musicSource = null;
          musicGain = null;
        }
      }

      function startMusicBuffer() {
        if (!canPlayMusicNow()) return;
        if (musicSource) return;

        const ctxAudio = getAudioContext();
        const buffer = decodedSounds.music;

        if (!ctxAudio || !buffer) return;

        try {
          const source = ctxAudio.createBufferSource();
          const gain = ctxAudio.createGain();

          source.buffer = buffer;
          source.loop = true;
          gain.gain.value = 0.45;

          source.connect(gain);
          gain.connect(ctxAudio.destination);

          musicStartedAt = ctxAudio.currentTime;
          source.start(0, musicOffset % buffer.duration);

          musicSource = source;
          musicGain = gain;
        } catch (err) {
          musicSource = null;
          musicGain = null;
        }
      }

      function playMusicIfAllowed() {
        if (!canPlayMusicNow()) return;

        const ctxAudio = getAudioContext();
        if (ctxAudio && ctxAudio.state === "suspended") {
          ctxAudio.resume().catch(() => {});
        }

        startMusicBuffer();
      }

      function keepTryingToStartMusic(durationMs = 1800) {
        const startedAt = performance.now();

        function attempt() {
          if (!audioUnlocked || !musicWanted || document.hidden || musicSource) return;

          playMusicIfAllowed();

          if (!musicSource && performance.now() - startedAt < durationMs) {
            requestAnimationFrame(attempt);
          }
        }

        requestAnimationFrame(attempt);
      }

      function unlockWebAudioNow() {
        const ctxAudio = getAudioContext();
        if (!ctxAudio) return;

        try {
          if (ctxAudio.state === "suspended") {
            ctxAudio.resume().catch(() => {});
          }

          // iOS can be picky with Web Audio. Starting a tiny silent buffer
          // during the same tap reliably unlocks the audio pipeline without
          // waiting for the next tap, crash sound, or any other sound event.
          const silentBuffer = ctxAudio.createBuffer(1, 1, 22050);
          const silentSource = ctxAudio.createBufferSource();
          silentSource.buffer = silentBuffer;
          silentSource.connect(ctxAudio.destination);
          silentSource.start(0);
        } catch (err) {
          // Ignore unlock failures.
        }
      }

      function unlockAndStartMusic() {
        musicWanted = true;

        if (!audioUnlocked) {
          audioUnlocked = true;
          unlockWebAudioNow();

          // These are usually already downloading/decoding from the title screen.
          // Calling them again is safe because the loader reuses the same promises.
          loadSoundBuffer("flap", ASSETS.flapSound);
          loadSoundBuffer("crash", ASSETS.crashSound);
          loadSoundBuffer("music", ASSETS.music).then(() => {
            playMusicIfAllowed();
            keepTryingToStartMusic(1200);
          });
        } else {
          unlockWebAudioNow();
        }

        playMusicIfAllowed();
        keepTryingToStartMusic(1800);
      }

      function pauseMusic() {
        stopMusicBuffer(true);
      }

      function handleAppVisibility() {
        if (document.hidden) {
          pauseMusic();

          if (audioContext && audioContext.state === "running") {
            audioContext.suspend().catch(() => {});
          }
        } else {
          if (audioContext && audioContext.state === "suspended") {
            audioContext.resume().then(() => {
              playMusicIfAllowed();
            }).catch(() => {});
          } else {
            playMusicIfAllowed();
          }
        }
      }

      document.addEventListener("visibilitychange", handleAppVisibility);
      window.addEventListener("pagehide", pauseMusic);
      window.addEventListener("blur", pauseMusic);
      window.addEventListener("pageshow", playMusicIfAllowed);
      window.addEventListener("focus", playMusicIfAllowed);

      function playFlapSound() {
        playBuffer("flap", 0.7);
      }

      function playFirstTapFlapSound() {
        if (!audioUnlocked || document.hidden) return;

        if (decodedSounds.flap) {
          playBuffer("flap", 0.7);
          playMusicIfAllowed();
          keepTryingToStartMusic(1200);
          return;
        }

        loadSoundBuffer("flap", ASSETS.flapSound).then(() => {
          playBuffer("flap", 0.7);
          playMusicIfAllowed();
          keepTryingToStartMusic(1200);
        });
      }

      function playCrashSound() {
        playBuffer("crash", 0.9);
      }

      // Begin downloading and decoding audio during the title/loading phase.
      // iOS will not allow sound output until the first tap, but it can often
      // fetch and decode the files ahead of time. This gives music the best
      // chance to start on the first tap instead of the second tap.
      Promise.all([
        loadSoundBuffer("flap", ASSETS.flapSound),
        loadSoundBuffer("crash", ASSETS.crashSound),
        loadSoundBuffer("music", ASSETS.music)
      ]).then(() => {
        state.audioReady = true;
      }).catch(() => {
        // Do not permanently block the game if audio fails to load.
        state.audioReady = true;
      });

      const bird = {
        x: 0,
        y: 0,
        vy: 0,
        width: 74,
        height: 56,
        frame: 0,
        frameTimer: 0,
        angle: 0
      };

      let W = 420;
      let H = 740;
      let groundH = 86;
      let groundY = H - groundH;

      const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
      const rand = (min, max) => Math.random() * (max - min) + min;

      function currentGap() {
        const startGap = clamp(H * DIFFICULTY.baseGapRatio, DIFFICULTY.minGapPx, DIFFICULTY.maxGapPx);
        return clamp(
          startGap - state.score * DIFFICULTY.gapTightenPerPoint,
          DIFFICULTY.minGapPx,
          DIFFICULTY.maxGapPx
        );
      }

      function currentSpawnInterval() {
        return Math.max(
          DIFFICULTY.minSpawnInterval,
          DIFFICULTY.baseSpawnInterval - state.score * DIFFICULTY.spawnTightenPerPoint
        );
      }

      function currentSpeed() {
        return state.worldSpeed * (
          1 + Math.min(DIFFICULTY.maxSpeedBoost, state.score * DIFFICULTY.speedIncreasePerPoint)
        );
      }

      function setPanel(title, subtitle, action, small = "") {
        ui.title.textContent = title;
        ui.subtitle.textContent = subtitle;
        ui.action.textContent = action;
        ui.small.textContent = small;
        ui.panel.classList.remove("hidden");
      }

      function hidePanel() {
        ui.panel.classList.add("hidden");
      }

      function updateHud() {
        ui.score.textContent = String(state.score);
        ui.best.textContent = String(state.best);
      }

      function getViewportSize() {
        // iOS home-screen apps can report window.innerHeight inconsistently
        // during launch, app switching, and orientation changes. visualViewport
        // is more reliable when available, with screen fallback for standalone.
        const vv = window.visualViewport;
        let viewW = Math.round(vv?.width || window.innerWidth || document.documentElement.clientWidth || screen.width);
        let viewH = Math.round(vv?.height || window.innerHeight || document.documentElement.clientHeight || screen.height);

        const standalone = window.navigator.standalone === true ||
          window.matchMedia("(display-mode: standalone)").matches;

        if (standalone && /iPhone|iPod/i.test(navigator.userAgent || "")) {
          const sw = Math.min(screen.width || viewW, screen.height || viewH);
          const sh = Math.max(screen.width || viewW, screen.height || viewH);

          if (Math.abs(window.orientation || 0) === 90) {
            viewW = Math.max(viewW, sh);
            viewH = Math.max(viewH, sw);
          } else {
            viewW = Math.max(viewW, sw);
            viewH = Math.max(viewH, sh);
          }
        }

        viewW = Math.max(1, viewW);
        viewH = Math.max(1, viewH);

        document.documentElement.style.setProperty("--app-height", viewH + "px");
        document.body.style.setProperty("--app-height", viewH + "px");

        return { viewW, viewH };
      }

      function resize() {
        const ratio = BASE_WIDTH / 740;
        const { viewW, viewH } = getViewportSize();

        const standalone = window.navigator.standalone === true ||
          window.matchMedia("(display-mode: standalone)").matches;
        const coarsePointer = window.matchMedia("(pointer: coarse)").matches;
        const phoneSized = Math.min(viewW, viewH) <= 600;

        // On phone/PWA, use the exact visible viewport so iOS cannot expose
        // the page background as a blue bar at the bottom. On desktop, contain
        // the playfield in a centered phone-shaped area and keep the HUD over it.
        const fillPhoneScreen = phoneSized && (standalone || coarsePointer);
        let cssW;
        let cssH;

        if (fillPhoneScreen) {
          cssW = viewW;
          cssH = viewH;
        } else {
          const maxGameW = 430;
          const maxGameH = Math.min(932, viewH);

          cssW = Math.min(viewW, maxGameW, maxGameH * ratio);
          cssH = cssW / ratio;

          if (cssH > viewH) {
            cssH = viewH;
            cssW = cssH * ratio;
          }
        }

        cssW = Math.round(cssW);
        cssH = Math.round(cssH);

        const gameLeft = Math.round((viewW - cssW) / 2);
        const gameTop = Math.round((viewH - cssH) / 2);

        canvas.style.width = cssW + "px";
        canvas.style.height = cssH + "px";
        canvas.width = Math.max(1, Math.round(cssW * DPR));
        canvas.height = Math.max(1, Math.round(cssH * DPR));

        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";

        W = cssW;
        H = cssH;
        groundH = Math.round(H * 0.115);
        groundY = H - groundH + 1;

        stageEl.style.width = viewW + "px";
        stageEl.style.height = viewH + "px";
        stageEl.style.setProperty("--game-left", gameLeft + "px");
        stageEl.style.setProperty("--game-top", gameTop + "px");
        stageEl.style.setProperty("--game-width", cssW + "px");
        stageEl.style.setProperty("--game-height", cssH + "px");
        stageEl.style.setProperty("--ui-scale", (cssW / BASE_WIDTH).toFixed(4));
        resetBird();
      }

      function resetBird() {
        bird.x = Math.round(W * 0.24);
        bird.y = Math.round(H * 0.42);
        bird.vy = 0;
        bird.angle = 0;
        bird.frame = 0;
        bird.frameTimer = 0;
        bird.width = W * 0.105 * VISUAL_SCALE.bird;
        bird.height = bird.width * 0.76;
      }

      function startFresh() {
        state.t = 0;
        // Keep background and ground scroll positions between games.
        // This prevents the world from visually resetting after a crash.
        state.spawnTimer = 0;
        state.score = 0;
        state.flash = 0;
        state.shake = 0;
        state.columnsBehindGround = false;
        state.pipes = [];
        state.particles = [];
        state.crashFeathers = [];
        state.crashAnim = 0;
        state.crashLock = 0;
        state.crashExit = 0;
        state.crashExiting = false;
        state.gameplayIntro = 0;
        state.gameplayIntroActive = false;
        resetBird();
        updateHud();
        hidePanel();

        if (state.hasStartedOnce) {
          beginRun();
          state.gameplayIntro = 0;
          state.gameplayIntroActive = true;
          bird.x = -bird.width * 1.2;
          bird.y = H * 0.42;
          bird.vy = 0;
          bird.angle = 0.08;
          return;
        }

        state.mode = "ready";
        state.titleIntro = 0;
        state.titleExit = 0;

        // First title-screen pass begins off the right side and crosses
        // the center of the logo before using alternate flight levels.
        state.titleBird.x = W + 220;
        state.titleBird.y = H * 0.42;
        state.titleBird.vx = 230;
        state.titleBird.direction = -1;
        state.titleBird.pass = 0;
        state.titleBird.targetY = H * 0.42;
      }

      function beginRun() {
        state.hasStartedOnce = true;
        state.columnsBehindGround = false;
        state.crashExit = 0;
        state.crashExiting = false;
        state.mode = "playing";
        hidePanel();

        // The first tap starts the game and makes the bird flap.
        // Play the flap sound here too so iOS has a real SFX event on the
        // first interaction, which also helps the Web Audio music begin.
        playFirstTapFlapSound();

        bird.vy = -Math.max(325, H * 0.6);
        bird.angle = -0.42;
        burst(bird.x - 8, bird.y + 6, 4, "rgba(255,255,255,.42)", true);
      }

      function startTitleExitThenRun() {
        if (state.mode !== "ready") return;
        if (!state.audioReady) return;

        state.mode = "titleExit";
        state.titleExit = 0;

        // Send the animated title bird rapidly offscreen in whichever
        // direction it was already flying.
        state.titleBird.vx = 980;

        hidePanel();
      }

      function beginCrashExitThenStart() {
        if (state.mode !== "gameover") return;
        if (state.crashLock > 0 || state.crashExiting) return;

        state.crashExiting = true;
        state.crashExit = 0;
        state.columnsBehindGround = true;

        // Push all existing feathers offscreen instead of letting them vanish.
        for (const f of state.crashFeathers) {
          const dir = f.x < W / 2 ? -1 : 1;
          f.vx += dir * rand(380, 760);
          f.vy -= rand(30, 130);
          f.vr += rand(-6, 6);
        }

        // Give on-screen columns an earthquake-style exit instead of
        // letting them disappear when the next game starts.
        for (const pipe of state.pipes) {
          pipe.exitSeed = rand(0, Math.PI * 2);
          pipe.exitLean = rand(-1, 1);
        }
      }

      function gameOver() {
        if (state.mode === "gameover") return;
        playCrashSound();
        state.mode = "gameover";
        state.flash = 0.28;
        state.shake = 12;
        state.crashAnim = 0;
        state.crashLock = 1.0;
        state.crashExit = 0;
        state.crashExiting = false;
        state.crashFeathers = [];
        hidePanel();

        if (state.score > state.best) {
          state.best = state.score;
          localStorage.setItem("sky_hopper_best", String(state.best));
        }

        updateHud();
        spawnCrashFeathers();
        burst(bird.x, bird.y, 16, "#fff4c7");
      }

      function flap() {
        playFlapSound();
        bird.vy = -Math.max(325, H * 0.6);
        bird.angle = -0.42;
        burst(bird.x - 8, bird.y + 6, 4, "rgba(255,255,255,.42)", true);
      }

      function getPipeMetrics(width) {
        const capH = width * (img.pillarCap.naturalHeight / img.pillarCap.naturalWidth);
        const baseH = width * (img.pillarBase.naturalHeight / img.pillarBase.naturalWidth);

        const widest = Math.max(img.pillarCap.naturalWidth, img.pillarBase.naturalWidth);
        const shaftRatio = img.pillarColumn.naturalWidth / widest;
        const shaftW = width * shaftRatio;

        const capOverlapTop = Math.round(capH * 0.50);
        const capOverlapBottom = Math.round(capH * 0.40);
        const baseOverlap = Math.round(baseH * 0.30);

        return { capH, baseH, shaftW, capOverlapTop, capOverlapBottom, baseOverlap };
      }

      function addPipe() {
        const gap = currentGap();
        const width = clamp(W * 0.148 * VISUAL_SCALE.column, 56 * VISUAL_SCALE.column, 72 * VISUAL_SCALE.column);
        const x = W + width + 20;

        const m = getPipeMetrics(width);
        const lowerCenterFromTop =
          gap / 2 +
          (PIPE_CONFIG.minShaftH + m.capOverlapTop + m.baseH - m.baseOverlap - 4);

        const upperCenterFromBottom =
          groundY +
          PIPE_CONFIG.baseShift +
          PIPE_CONFIG.bottomShift -
          m.baseOverlap -
          4 -
          m.capH +
          m.capOverlapBottom -
          PIPE_CONFIG.minShaftH -
          gap / 2;

        const ceilingMargin = H * 0.08 + gap / 2;
        const floorMargin = H - (groundH + H * 0.05) - gap / 2;

        let low = Math.max(ceilingMargin, lowerCenterFromTop);
        let high = Math.min(floorMargin, upperCenterFromBottom);

        if (low > high) {
          low = Math.max(ceilingMargin, gap / 2 + 90);
          high = Math.min(floorMargin, groundY - groundH - gap / 2 - 90);
        }

        const center = rand(low, high);

        state.pipes.push({
          x,
          width,
          topEnd: center - gap / 2,
          bottomStart: center + gap / 2,
          scored: false,
          exitSeed: 0,
          exitLean: 0
        });
      }

      function burst(x, y, count, color, soft = false) {
        for (let i = 0; i < count; i++) {
          state.particles.push({
            x,
            y,
            vx: rand(-120, 120) + (soft ? -25 : 0),
            vy: rand(-150, 40),
            life: rand(0.3, 0.8),
            maxLife: 1,
            size: rand(soft ? 2 : 3, soft ? 5 : 8),
            color
          });
        }
      }

      function spawnCrashFeathers() {
        const logoW = Math.min(W * 0.81, H * 0.486);
        const logoH = img.crashLogo.naturalWidth
          ? logoW * (img.crashLogo.naturalHeight / img.crashLogo.naturalWidth)
          : logoW * 0.34;
        const cx = W / 2;
        const cy = H * 0.38;

        for (let i = 0; i < 16; i++) {
          const angle = rand(-Math.PI, Math.PI);
          const speed = rand(190, 520);
          const fromLogoX = cx + rand(-logoW * 0.30, logoW * 0.30);
          const fromLogoY = cy + rand(-logoH * 0.18, logoH * 0.20);

          let vx = Math.cos(angle) * speed;
          let vy = Math.sin(angle) * speed * 0.42 - rand(0, 52);

          // Feathers can pop upward, but not too high or too fast.
          vy = Math.max(vy, -H * 0.30);

          state.crashFeathers.push({
            x: fromLogoX,
            y: fromLogoY,
            vx,
            vy,
            baseRot: rand(-Math.PI, Math.PI),
            rot: rand(-Math.PI, Math.PI),
            vr: rand(-2.2, 2.2),
            flutterPhase: rand(0, Math.PI * 2),
            flutterSpeed: rand(3.8, 6.6),
            flutterAmp: rand(34, 72),
            tiltAmp: rand(0.34, 0.72),
            drift: rand(-18, 18),
            frame: Math.floor(rand(0, 4)),
            size: rand(W * 0.075, W * 0.130)
          });
        }
      }

      function scorePipe() {
        state.score += 1;
        updateHud();
        state.flash = 0.05;
        burst(bird.x + bird.width * 0.18, bird.y - bird.height * 0.05, 10, "rgba(255,245,168,.75)", true);
      }

      function updateParticles(dt) {
        for (const p of state.particles) {
          p.life -= dt;
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.vy += H * 0.45 * dt;
          p.vx *= 0.99;
        }
        state.particles = state.particles.filter(p => p.life > 0);
      }

      function updateCrashFeathers(dt) {
        for (const f of state.crashFeathers) {
          const phase = state.t * f.flutterSpeed + f.flutterPhase;
          const flutter = Math.sin(phase) * f.flutterAmp;
          const flutterNudge = Math.cos(phase * 0.72) * f.flutterAmp * 0.22;

          f.x += (f.vx + flutter + f.drift + flutterNudge) * dt;
          f.y += f.vy * dt;

          if (state.crashExiting) {
            // Exit animation: feathers sweep away faster, but still flutter.
            f.vx *= 0.996;
            f.vy += H * 0.08 * dt;
            f.vy = Math.min(f.vy, H * 0.42);
          } else {
            // Slow feather fall with noticeable air resistance.
            f.vy += H * 0.075 * dt;
            f.vy = Math.min(f.vy, H * 0.18);
            f.vx *= 0.955;
            f.drift *= 0.992;
          }

          f.vr *= 0.985;
          f.rot = f.baseRot + Math.sin(phase) * f.tiltAmp + Math.sin(phase * 0.43) * 0.18;
          f.baseRot += f.vr * dt;
        }

        const margin = Math.max(W, H) * 0.55;
        state.crashFeathers = state.crashFeathers.filter(f =>
          f.x > -margin && f.x < W + margin && f.y > -margin && f.y < H + margin
        );
      }

      function getPipeParts(pipe) {
        const m = getPipeMetrics(pipe.width);
        const shaftX = pipe.x + (pipe.width - m.shaftW) / 2;

        const bottomCapY = pipe.bottomStart + 4 + PIPE_CONFIG.bottomShift;
        const bottomBaseY = groundY - m.baseH + PIPE_CONFIG.baseShift + PIPE_CONFIG.bottomShift;
        const bottomShaftY = bottomCapY + m.capH - m.capOverlapBottom;
        const bottomShaftEnd = bottomBaseY + m.baseH - m.baseOverlap;
        const bottomShaftH = Math.max(PIPE_CONFIG.minShaftH, bottomShaftEnd - bottomShaftY);

        const topBaseY = PIPE_CONFIG.topOffset;
        const topCapY = pipe.topEnd - m.capH + 4 + PIPE_CONFIG.topOffset;
        const topShaftY = topBaseY + m.baseH - m.baseOverlap;
        const topShaftEnd = topCapY + m.capH - m.capOverlapTop;
        const topShaftH = Math.max(PIPE_CONFIG.minShaftH, topShaftEnd - topShaftY);

        return {
          top: {
            base: { x: pipe.x, y: topBaseY, w: pipe.width, h: m.baseH },
            shaft: { x: shaftX, y: topShaftY, w: m.shaftW, h: topShaftH },
            cap: { x: pipe.x, y: topCapY, w: pipe.width, h: m.capH }
          },
          bottom: {
            cap: { x: pipe.x, y: bottomCapY, w: pipe.width, h: m.capH },
            shaft: { x: shaftX, y: bottomShaftY, w: m.shaftW, h: bottomShaftH },
            base: { x: pipe.x, y: bottomBaseY, w: pipe.width, h: m.baseH }
          }
        };
      }

      function hitRect(ax, ay, aw, ah, bx, by, bw, bh) {
        return !(ax + aw < bx || ax > bx + bw || ay + ah < by || ay > by + bh);
      }

      function collides(pipe) {
        const bx = bird.x - bird.width * 0.20;
        const by = bird.y - bird.height * 0.20;
        const bw = bird.width * 0.40;
        const bh = bird.height * 0.40;

        const parts = getPipeParts(pipe);
        const rawRects = [
          parts.top.base, parts.top.shaft, parts.top.cap,
          parts.bottom.cap, parts.bottom.shaft, parts.bottom.base
        ];

        const rects = rawRects.map(r => {
          const isShaft = r === parts.top.shaft || r === parts.bottom.shaft;
          const insetX = Math.min(r.w * (isShaft ? 0.10 : 0.08), 10);
          const insetY = isShaft ? 0 : Math.min(r.h * 0.05, 6);
          return {
            x: r.x + insetX,
            y: r.y + insetY,
            w: Math.max(1, r.w - insetX * 2),
            h: Math.max(1, r.h - insetY * 2)
          };
        });

        return rects.some(r => r.h > 0 && hitRect(bx, by, bw, bh, r.x, r.y, r.w, r.h));
      }

      function input() {
        unlockAndStartMusic();

        if (state.mode === "loading") return;
        if (state.mode === "ready") return startTitleExitThenRun();
        if (state.mode === "titleExit") return;
        if (state.mode === "playing") {
          if (state.gameplayIntroActive) return;
          return flap();
        }
        if (state.mode === "gameover") {
          return beginCrashExitThenStart();
        }
      }

      function update(dt) {
        state.t += dt;
        state.flash = Math.max(0, state.flash - dt * 1.2);
        state.shake = Math.max(0, state.shake - dt * 40);

        bird.frameTimer += dt;
        const flapRate = state.mode === "playing" ? 0.085 : 0.13;
        if (bird.frameTimer > flapRate) {
          bird.frameTimer = 0;
          bird.frame = (bird.frame + 1) % 4;
        }

        if (state.mode === "ready") {
          state.titleIntro = Math.min(1, state.titleIntro + dt * 2.8);

          const tb = state.titleBird;
          tb.x += tb.vx * dt * tb.direction;
          tb.y = tb.targetY + Math.sin(state.t * 2.6) * 10;

          if (tb.direction === 1 && tb.x > W + 220) {
            tb.direction = -1;
            tb.x = W + 220;
            tb.pass += 1;

            // First pass is always across the center of the logo.
            // Later passes alternate between higher and lower flight paths.
            const levels = [
              H * 0.42,
              H * 0.34,
              H * 0.50,
              H * 0.38,
              H * 0.56
            ];
            tb.targetY = levels[tb.pass % levels.length];
          }

          if (tb.direction === -1 && tb.x < -220) {
            tb.direction = 1;
            tb.x = -220;
            tb.pass += 1;

            const levels = [
              H * 0.42,
              H * 0.34,
              H * 0.50,
              H * 0.38,
              H * 0.56
            ];
            tb.targetY = levels[tb.pass % levels.length];
          }

          updateParticles(dt);
          return;
        }

        if (state.mode === "titleExit") {
          state.titleExit = Math.min(1, state.titleExit + dt * 5.2);

          const tb = state.titleBird;
          tb.x += tb.vx * dt * tb.direction;
          tb.y = tb.targetY + Math.sin(state.t * 2.6) * 10;

          updateParticles(dt);

          if (state.titleExit >= 1) {
            beginRun();
            state.hasStartedOnce = true;

            // Gameplay bird enters from the left after the title clears,
            // instead of simply appearing in place.
            state.gameplayIntro = 0;
            state.gameplayIntroActive = true;
            bird.x = -bird.width * 1.2;
            bird.y = H * 0.42;
            bird.vy = 0;
            bird.angle = 0.08;
          }

          return;
        }

        if (state.mode === "gameover") {
          state.crashAnim = Math.min(1, state.crashAnim + dt);
          state.crashLock = Math.max(0, state.crashLock - dt);

          if (state.crashExiting) {
            state.crashExit = Math.min(1, state.crashExit + dt * 3.8);
          }

          updateCrashFeathers(dt);
          updateParticles(dt);

          if (state.crashExiting && state.crashExit >= 1) {
            startFresh();
          }

          return;
        }

        if (state.mode !== "playing") {
          updateParticles(dt);
          return;
        }

        const speed = currentSpeed();
        state.bgScroll += dt * speed * 0.16;
        state.groundScroll += dt * speed;

        if (state.gameplayIntroActive) {
          state.gameplayIntro = Math.min(1, state.gameplayIntro + dt * 3.4);
          const introT = 1 - Math.pow(1 - state.gameplayIntro, 3);
          const startX = -bird.width * 1.2;
          const targetX = Math.round(W * 0.24);
          bird.x = startX + (targetX - startX) * introT;
          bird.y = H * 0.42 + Math.sin(state.t * 4.2) * 6;
          bird.vy = 0;
          bird.angle = 0.08 + Math.sin(state.t * 4.0) * 0.05;

          if (state.gameplayIntro >= 1) {
            state.gameplayIntroActive = false;
            bird.x = targetX;
            bird.y = H * 0.42;
            bird.vy = -Math.max(325, H * 0.6);
            bird.angle = -0.42;
          }

          updateParticles(dt);
          return;
        }

        bird.vy += H * 2.05 * dt;
        bird.y += bird.vy * dt;
        bird.angle = clamp(bird.vy / (H * 0.8), -0.65, 1.12);

        state.spawnTimer += dt;
        const spawnEvery = currentSpawnInterval();
        while (state.spawnTimer >= spawnEvery) {
          state.spawnTimer -= spawnEvery;
          addPipe();
        }

        for (const pipe of state.pipes) {
          pipe.x -= speed * dt;

          if (!pipe.scored && pipe.x + pipe.width < bird.x) {
            pipe.scored = true;
            scorePipe();
          }

          if (collides(pipe)) {
            gameOver();
          }
        }

        state.pipes = state.pipes.filter(pipe => pipe.x + pipe.width > -240);

        const ceiling = bird.height * 0.42;
        const floor = groundY - bird.height * 0.26 + 15;

        if (bird.y < ceiling) {
          bird.y = ceiling;
          bird.vy = Math.max(0, bird.vy * 0.2);
        }

        if (bird.y > floor) {
          bird.y = floor;
          bird.vy = 0;
          gameOver();
        }

        updateParticles(dt);
      }

      function drawRepeatingCrop(image, sx, sy, sw, sh, scroll, y, drawH, overlap = 0) {
        const scale = drawH / sh;
        const tileW = sw * scale;
        const offset = ((scroll % tileW) + tileW) % tileW;

        for (let x = -offset - tileW; x < W + tileW; x += (tileW - overlap)) {
          ctx.drawImage(image, sx, sy, sw, sh, x, y, tileW, drawH);
        }
      }

      function drawRepeatingImage(image, scroll, y, drawH, cropRight = 0, overlap = 0) {
        const sw = image.width - cropRight;
        const sh = image.height;
        const scale = drawH / sh;
        const tileW = sw * scale;
        const offset = ((scroll % tileW) + tileW) % tileW;

        for (let x = -offset - tileW; x < W + tileW; x += (tileW - overlap)) {
          ctx.drawImage(image, 0, 0, sw, sh, x, y, tileW, drawH);
        }
      }

      function drawBackground() {
        // Draw from farthest layer to nearest layer:
        // clouds -> mountains -> trees -> plants -> game elements.
        // The foreground columns, bird, particles, and ground are drawn later.
        drawRepeatingImage(
          img.backgroundClouds,
          state.bgScroll * 0.16,
          0,
          H,
          1,
          1
        );

        drawRepeatingImage(
          img.backgroundMountains,
          state.bgScroll * 0.30,
          0,
          H,
          1,
          1
        );

        drawRepeatingImage(
          img.backgroundTrees,
          state.bgScroll * 0.50,
          0,
          H,
          1,
          1
        );

        drawRepeatingImage(
          img.backgroundPlants,
          state.bgScroll * 0.74,
          0,
          H,
          1,
          1
        );

        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, "rgba(255,255,255,0.00)");
        grad.addColorStop(1, "rgba(255,214,120,0.10)");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
      }

      function drawFlippedImage(image, rect) {
        ctx.save();
        ctx.translate(rect.x, rect.y + rect.h);
        ctx.scale(1, -1);
        ctx.drawImage(image, 0, 0, image.naturalWidth, image.naturalHeight, 0, 0, rect.w, rect.h);
        ctx.restore();
      }

      function drawTiledColumn(rect, flipY = false) {
        if (rect.h <= 0) return;

        const tileH = rect.w * (img.pillarColumn.naturalHeight / img.pillarColumn.naturalWidth);

        ctx.save();
        ctx.beginPath();
        ctx.rect(rect.x, rect.y, rect.w, rect.h);
        ctx.clip();

        if (flipY) {
          ctx.translate(0, rect.y + rect.h);
          ctx.scale(1, -1);
          let y = 0;
          while (y < rect.h + tileH) {
            ctx.drawImage(img.pillarColumn, rect.x, y, rect.w, tileH);
            y += tileH - 1;
          }
        } else {
          let y = rect.y;
          while (y < rect.y + rect.h + tileH) {
            ctx.drawImage(img.pillarColumn, rect.x, y, rect.w, tileH);
            y += tileH - 1;
          }
        }

        ctx.restore();
      }


      function smoothStep(t) {
        return t * t * (3 - 2 * t);
      }

      function pipeExitOffset(pipe, isTop) {
        if (state.mode !== "gameover" || !state.crashExiting) return { x: 0, y: 0, lean: 0 };

        const e = smoothStep(clamp(state.crashExit, 0, 1));
        const seed = pipe.exitSeed || 0;
        const quake = Math.sin(state.t * 68 + seed) * (1 - e) * 9;
        const fall = e * H * 0.62;
        const lean = (pipe.exitLean || 0) * e * 10;

        return {
          x: quake + lean,
          y: isTop ? -fall : fall,
          lean
        };
      }

      function offsetRect(rect, off) {
        return {
          x: rect.x + off.x,
          y: rect.y + off.y,
          w: rect.w,
          h: rect.h
        };
      }

      function drawPipeShafts() {
        for (const pipe of state.pipes) {
          const parts = getPipeParts(pipe);
          const topOff = pipeExitOffset(pipe, true);
          const bottomOff = pipeExitOffset(pipe, false);

          drawTiledColumn(offsetRect(parts.top.shaft, topOff), true);
          drawTiledColumn(offsetRect(parts.bottom.shaft, bottomOff), false);
        }
      }

      function drawPipeDecorations() {
        for (const pipe of state.pipes) {
          const parts = getPipeParts(pipe);
          const topOff = pipeExitOffset(pipe, true);
          const bottomOff = pipeExitOffset(pipe, false);

          drawFlippedImage(img.pillarBase, offsetRect(parts.top.base, topOff));
          drawFlippedImage(img.pillarCap, offsetRect(parts.top.cap, topOff));

          const bottomBase = offsetRect(parts.bottom.base, bottomOff);
          const bottomCap = offsetRect(parts.bottom.cap, bottomOff);

          ctx.drawImage(img.pillarBase, bottomBase.x, bottomBase.y, bottomBase.w, bottomBase.h);
          ctx.drawImage(img.pillarCap, bottomCap.x, bottomCap.y, bottomCap.w, bottomCap.h);
        }
      }

      function drawBird() {
        const frames = 4;
        const frameW = img.bird.width / frames;
        const sx = bird.frame * frameW;

        ctx.save();
        ctx.translate(bird.x, bird.y);
        ctx.rotate(bird.angle);
        ctx.shadowColor = "rgba(0,0,0,.20)";
        ctx.shadowBlur = 16;
        ctx.shadowOffsetY = 8;

        ctx.drawImage(
          img.bird,
          sx + BOX.birdTrimX,
          BOX.birdSheet.y - BOX.birdTrimY,
          frameW - BOX.birdTrimX * 2,
          BOX.birdSheet.h + BOX.birdTrimY * 2,
          -bird.width / 2,
          -bird.height / 2,
          bird.width,
          bird.height
        );

        ctx.restore();
      }


      function easeOutBack(t) {
        const c1 = 1.70158;
        const c3 = c1 + 1;
        return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
      }

      function drawTitleBird(x, y, width, alpha) {
        const frames = 4;
        const frameW = img.bird.width / frames;
        const sx = bird.frame * frameW;
        const height = width * 0.76;

        ctx.save();
        ctx.globalAlpha *= alpha;
        ctx.translate(x, y);
        ctx.rotate(Math.sin(state.t * 2.8) * 0.09);
        ctx.shadowColor = "rgba(0,0,0,.22)";
        ctx.shadowBlur = 18;
        ctx.shadowOffsetY = 8;

        ctx.drawImage(
          img.bird,
          sx + BOX.birdTrimX,
          BOX.birdSheet.y - BOX.birdTrimY,
          frameW - BOX.birdTrimX * 2,
          BOX.birdSheet.h + BOX.birdTrimY * 2,
          -width / 2,
          -height / 2,
          width,
          height
        );

        ctx.restore();
      }

      function drawTitleSplash() {
        if (state.mode !== "ready" && state.mode !== "titleExit") return;
        if (!img.titleLogo || !img.titleLogo.naturalWidth) return;

        const intro = clamp(state.titleIntro, 0, 1);
        const exit = clamp(state.titleExit, 0, 1);
        const inScale = 0.45 + easeOutBack(intro) * 0.55;
        const pulse = 1 + Math.sin(state.t * 3.0) * 0.018;
        const exitScale = 1 + exit * 0.42;
        const alpha = Math.max(0, 1 - exit * 1.2);
        const slideY = (1 - intro) * -H * 0.18 - exit * H * 0.20;
        const logoW = Math.min(W * 0.86, H * 0.54);
        const logoH = logoW * (img.titleLogo.naturalHeight / img.titleLogo.naturalWidth);
        const logoX = W / 2;
        const logoY = H * 0.42 + slideY;

        // Soft animated glow behind title.
        ctx.save();
        ctx.globalAlpha = alpha * (0.095 + Math.sin(state.t * 2.4) * 0.018);
        ctx.fillStyle = "rgba(255,235,145,1)";
        ctx.beginPath();
        ctx.ellipse(logoX, logoY + logoH * 0.18, logoW * 0.62, logoH * 0.40, 0, 0, Math.PI * 2);
        ctx.filter = "blur(34px)";
        ctx.fill();
        ctx.filter = "none";
        ctx.restore();

        // Logo, centered on screen.
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(logoX, logoY);
        ctx.scale(inScale * pulse * exitScale, inScale * pulse * exitScale);
        ctx.rotate(Math.sin(state.t * 1.8) * 0.015);
        ctx.drawImage(img.titleLogo, -logoW / 2, -logoH / 2, logoW, logoH);
        ctx.restore();

        // Animated bird flying in front of the title graphic.
        const tb = state.titleBird;
        // Title bird stays at the earlier title-screen size even though
        // the gameplay bird was enlarged.
        const titleBirdW = bird.width * 1.76;
        const frames = 4;
        const frameW = img.bird.width / frames;
        const sx = bird.frame * frameW;
        const titleBirdH = titleBirdW * 0.76;

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(tb.x, tb.y);

        // Flip the bird based on travel direction.
        // The sprite faces right by default, so scale(-1, 1) when flying left.
        if (tb.direction === -1) {
          ctx.scale(-1, 1);
        }

        ctx.rotate(Math.sin(state.t * 2.5) * 0.10);
        ctx.shadowColor = "rgba(0,0,0,.24)";
        ctx.shadowBlur = 18;
        ctx.shadowOffsetY = 8;

        ctx.drawImage(
          img.bird,
          sx + BOX.birdTrimX,
          BOX.birdSheet.y - BOX.birdTrimY,
          frameW - BOX.birdTrimX * 2,
          BOX.birdSheet.h + BOX.birdTrimY * 2,
          -titleBirdW / 2,
          -titleBirdH / 2,
          titleBirdW,
          titleBirdH
        );

        ctx.restore();

        // Small ambient sparkle/flap circles around the title.
        if (state.mode === "ready" && Math.random() < 0.10) {
          burst(
            W * rand(0.28, 0.72),
            H * rand(0.28, 0.56),
            1,
            "rgba(255,245,170,.38)",
            true
          );
        }
      }


      function easeOutElastic(t) {
        if (t === 0 || t === 1) return t;
        const c4 = (2 * Math.PI) / 3;
        return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
      }

      function drawCrashFeathers() {
        if (!img.feathers || !img.feathers.naturalWidth) return;

        const frames = 4;
        const frameW = img.feathers.naturalWidth / frames;
        const frameH = img.feathers.naturalHeight;

        for (const f of state.crashFeathers) {
          ctx.save();
          ctx.translate(f.x, f.y);
          ctx.rotate(f.rot);

          const drawW = f.size;
          const drawH = drawW * (frameH / frameW);

          ctx.drawImage(
            img.feathers,
            f.frame * frameW,
            0,
            frameW,
            frameH,
            -drawW / 2,
            -drawH / 2,
            drawW,
            drawH
          );

          ctx.restore();
        }
      }

      function drawCrashSplash() {
        if (state.mode !== "gameover") return;
        if (!img.crashLogo || !img.crashLogo.naturalWidth) return;

        const t = clamp(state.crashAnim, 0, 1);
        const exit = clamp(state.crashExit, 0, 1);
        const crashIn = easeOutElastic(Math.min(1, t * 1.12));
        const settleShake = state.crashLock > 0 ? Math.sin(state.t * 72) * (1 - crashIn) * 0.10 : Math.sin(state.t * 2.2) * 0.012;
        const exitEase = exit * exit * (3 - 2 * exit);

        const logoW = Math.min(W * 0.81, H * 0.486);
        const logoH = logoW * (img.crashLogo.naturalHeight / img.crashLogo.naturalWidth);
        const logoX = W / 2 + exitEase * W * 1.25;
        const logoY = H * 0.38 - exitEase * H * 0.12;

        // Feathers are drawn first so they appear to burst from behind the logo.
        drawCrashFeathers();

        ctx.save();
        ctx.translate(logoX, logoY);
        ctx.rotate(settleShake);
        ctx.scale((0.25 + crashIn * 0.75) * (1 - exitEase * 0.22), (0.25 + crashIn * 0.75) * (1 - exitEase * 0.22));

        ctx.shadowColor = "rgba(0,0,0,.32)";
        ctx.shadowBlur = 22;
        ctx.shadowOffsetY = 10;

        ctx.drawImage(
          img.crashLogo,
          -logoW / 2,
          -logoH / 2,
          logoW,
          logoH
        );

        ctx.restore();
      }

      function drawParticles() {
        for (const p of state.particles) {
          ctx.globalAlpha = clamp(p.life / p.maxLife, 0, 1);
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }


      function groundQuakeOffset() {
        if (state.mode !== "gameover" || !state.crashExiting) return { x: 0, y: 0 };

        const e = clamp(state.crashExit, 0, 1);
        const fade = 1 - e;
        return {
          x: Math.sin(state.t * 82) * 5 * fade + Math.sin(state.t * 131) * 2 * fade,
          y: Math.cos(state.t * 96) * 3 * fade
        };
      }

      function drawGround() {
        const quake = groundQuakeOffset();

        ctx.save();
        ctx.translate(quake.x, quake.y);

        drawRepeatingCrop(
          img.ground,
          BOX.groundCrop.x,
          BOX.groundCrop.y,
          BOX.groundCrop.w,
          BOX.groundCrop.h,
          state.groundScroll,
          groundY,
          groundH,
          1
        );

        ctx.restore();
      }

      function drawOverlay() {
        if (state.flash > 0) {
          ctx.fillStyle = `rgba(255,255,255,${state.flash})`;
          ctx.fillRect(0, 0, W, H);
        }
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);

        if (state.shake > 0) {
          ctx.save();
          ctx.translate(rand(-state.shake, state.shake), rand(-state.shake, state.shake));
        }

        drawBackground();

        if (state.columnsBehindGround) {
          // During the crash-exit earthquake animation, move all column
          // pieces behind the ground so they disappear into/behind the terrain.
          drawPipeShafts();
          drawPipeDecorations();
          drawGround();
        } else {
          // Normal gameplay layering.
          drawPipeShafts();
          drawGround();
          drawPipeDecorations();
        }

        if (state.mode === "playing" || state.mode === "gameover") {
          drawBird();
        }

        drawParticles();
        drawTitleSplash();
        drawCrashSplash();
        drawOverlay();

        if (state.shake > 0) ctx.restore();
      }

      function allImagesLoaded() {
        return Object.values(img).every(i => i.complete && i.naturalWidth > 0);
      }

      function readyWhenLoaded() {
        if (allImagesLoaded()) {
          state.mode = "ready";
          updateHud();
          startFresh();
        } else {
          setTimeout(readyWhenLoaded, 60);
        }
      }

      let last = 0;
      function loop(ts) {
        const dt = Math.min(0.033, (ts - last) / 1000 || 0);
        last = ts;
        update(dt);
        draw();
        requestAnimationFrame(loop);
      }

      let resizeQueued = false;
      function queueResize() {
        if (resizeQueued) return;
        resizeQueued = true;
        requestAnimationFrame(() => {
          resizeQueued = false;
          resize();
        });
      }

      window.addEventListener("resize", queueResize);
      window.addEventListener("orientationchange", () => {
        queueResize();
        setTimeout(queueResize, 120);
        setTimeout(queueResize, 420);
        setTimeout(queueResize, 900);
      });

      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", queueResize);
        window.visualViewport.addEventListener("scroll", queueResize);
      }

      window.addEventListener("pageshow", () => {
        queueResize();
        setTimeout(queueResize, 250);
      });
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
          queueResize();
          setTimeout(queueResize, 250);
        }
      });

      window.addEventListener("keydown", e => {
        if (e.code === "Space" || e.code === "ArrowUp") {
          e.preventDefault();
          input();
        }
      }, { passive: false });

      ["pointerdown", "touchstart", "mousedown"].forEach(evt => {
        canvas.addEventListener(evt, e => {
          e.preventDefault();
          input();
        }, { passive: false });

        tapZone.addEventListener(evt, e => {
          e.preventDefault();
          input();
        }, { passive: false });
      });

      resize();
      setTimeout(queueResize, 80);
      setTimeout(queueResize, 300);
      setTimeout(queueResize, 900);
      updateHud();
      hidePanel();
      readyWhenLoaded();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
